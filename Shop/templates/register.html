{% extends 'base.html' %}

{% block title %}Register - E-Commerce Shop{% endblock %}

{% block content %}
<section class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>Welcome </h2>
                <p>Register For account</p>
            </div>
            
            <form method="post" action="{% url 'register' %}" class="login-form">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" name="username" placeholder="Enter your username" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="E-mail">E-mail</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn-login">Login</button>
            </form>
            
            <div class="login-footer">
                <p>Already have an account? <a href="{% url 'login' %}">Login</a></p>
            </div>
        </div>
    </div>
</section>

<style>
   
     .login-page {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
       
    }
    .login-container {
        width: 100%;
        max-width: 420px;
    }
    
    .login-card {
        background: rgb(255, 255, 255);
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(247, 118, 12, 0.1);
        padding: 2.5rem;
        animation: fadeInUp 0.5s ease-out;
     }
    
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .login-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    
    .login-header h2 {
        font-size: 1.75rem;
        color: rgb(202, 37, 37);
        margin-bottom: 0.5rem;
        font-weight: 600;
    }
    
    .login-header p {
        color: #0aed0a;
        font-size: 0.95rem;
    }
    
    .login-form .form-group {
        margin-bottom: 1.25rem;
    }
    
    .login-form label {
        display: block;
        margin-bottom: 0.5rem;
        color: #e14f11;
        font-weight: 500;
        font-size: 0.9rem;
    }
    
    .input-wrapper {
        position: relative;
        margin-top: 0.5rem;
        margin-left: 0.5rem;
    }
    
    .input-wrapper input {
        width: 100%;
        padding: 0.875rem 1rem 0.875rem 2.75rem;
        border: 2px solid #ee1010;
        border-radius: 10px;
        font-size: 1rem;
        transition: all 0.3s ease;
        background: #414447;
        margin-left: 10px;
    }
    
    .input-wrapper input:focus {
        outline: none;
        border-color: #4a90d9;
        background: #fff;
        box-shadow: 0 0 0 4px rgba(74, 144, 217, 0.1);
    }
    
    .input-wrapper input::placeholder {
        color: #9ca3af;
    }
    
    .input-icon {
        position: absolute;
        left: 1rem;
        top: 50%;
        color: #9ca3af;
        
    }
    
    .form-options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
        font-size: 0.9rem;
    }
    
    .remember-me {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        color: #0fec1e;
    }
    
    .remember-me input[type="checkbox"] {
        width: 13px;
        height: 13px;
        accent-color: rgb(31, 241, 76);
        cursor: pointer;
    }
    
    .forgot-password {
        color: #ed1245;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.3s ease;
    }
    
    .forgot-password:hover {
        color: #2d6cb5;
    }
    
    .btn-login {
        width: 100%;
        padding: 1rem;
        background: linear-gradient(135deg, #2ce00c 0%, #2bde0b 100%);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .btn-login:hover {
        box-shadow: 0 6px 20px rgba(74, 144, 217, 0.4);
    }
    
    .btn-login:active {
        transform: translateY(0);
    }
    
    .login-footer {
        text-align: center;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid #e5e7eb;
    }
    
    .login-footer p {
        color: #666;
        font-size: 0.9rem;
    }
    
    .login-footer a {
        color: #4a90d9;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.3s ease;
    }
    
    .login-footer a:hover {
        color: #2d6cb5;
    }
    
  
        .login-header h2 {
            font-size: 1.5rem;
        }
</style>
</section>
{% endblock %}
