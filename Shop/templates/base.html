<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}E-Commerce Shop{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
        }
        header {
            background: #333;
            color: #fff;
            padding: 1rem;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        nav ul {
            list-style: none;
            display: flex;
            gap: 1rem;
            justify-content:center;
        }
        nav a {
            color: #fff;
            text-decoration: none;
        }
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
            min-height: calc(100vh - 200px);
        }
        footer {
            background: #333;
            color: #fff;
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
        }
        .form-group {
            margin-bottom: 1rem;
            justify-content: center;
            display: flex;
            align-items: center;
            
        }
        .logo h1 {
            font-size: 1.5rem;
            color: #0fec1e;
            allign-items: left;
            display: flex;
            justify-content: left;

        }
        .card {
            border: 1px solid #ef8411;
            border-radius: 10px;
            padding: 7px;
            text-align: center;
            align-items: center;
            width: 300px;
        }
        
    </style>    
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <h1>Wow_Scents  Shop</h1>
            </div>
            <ul>
                <li><a href="{% url 'home' %}">Home</a></li>
                <li><a href="{% url 'about' %}">About</a></li>
                <li><a href="{% url 'login' %}">Login</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        {% block content %}
        {% endblock %}
    </main>
    
    <footer>
        <p>&copy; 2026 Wow_Scents  Shop. All rights reserved.</p>
    </footer>
</body>
</html>
